<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日翊盤點平台 - 登入</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-900 to-slate-800 flex items-center justify-center p-4">

  <div class="w-full max-w-md">
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">
      <!-- 標題區 -->
      <div class="bg-gradient-to-r from-blue-700 to-blue-500 px-8 py-10 text-center">
        <div class="text-5xl mb-3">📋</div>
        <h1 class="text-2xl font-bold text-white">日翊盤點平台</h1>
        <p class="text-blue-100 text-sm mt-2">多品牌盤點作業管理系統</p>
      </div>

      <!-- 登入表單 -->
      <form id="loginForm" class="px-8 py-8 space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">帳號</label>
          <input type="text" id="userId" maxlength="15" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="請輸入帳號（最長 15 字元）">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">密碼</label>
          <input type="password" id="password" maxlength="30" required
            class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
            placeholder="請輸入密碼（最長 30 字元）">
        </div>

        <div id="errorMsg" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>

        <button type="submit" id="loginBtn"
          class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-lg transition">
          登入
        </button>

        <!-- 原型展示用入口，正式上線時 IT 工程師請移除此連結 -->
        <div class="text-center pt-2 border-t border-gray-100">
          <a href="app.html" class="text-xs text-gray-400 hover:text-blue-500 transition">原型展示模式（略過登入）</a>
        </div>
      </form>
    </div>
    <p class="text-center text-blue-200 text-xs mt-6">© 2026 日翊文化事業股份有限公司</p>
  </div>

  <script>
    // ============================================================
    // 日翊帳號驗證（CheckUserId API）
    // 規範：POST https://eip.fme.com.tw/FMEIP/AasApi/CheckUserId
    // 回傳 MSG 格式為「代碼 + 空格 + 說明」，僅取前三碼判斷
    // 嚴格禁止程式重複提交表單：送出前 disable 按鈕
    // ============================================================
    const API_URL = 'https://eip.fme.com.tw/FMEIP/AasApi/CheckUserId';

    const form = document.getElementById('loginForm');
    const btn = document.getElementById('loginBtn');
    const errorBox = document.getElementById('errorMsg');

    const ERROR_MESSAGES = {
      '100': '帳號或密碼錯誤',
      '200': 'AD 認證錯誤',
      '998': '系統暫時無法使用，請稍後再試',
      '999': '系統發生錯誤，請聯絡管理員'
    };

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.remove('hidden');
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.add('hidden');

      const userId = document.getElementById('userId').value.trim();
      const password = document.getElementById('password').value;

      if (userId.length > 15) { showError('帳號不可超過 15 字元'); return; }
      if (password.length > 30) { showError('密碼不可超過 30 字元'); return; }

      // 防止重複提交：先 disable，收到回應後再 enable
      btn.disabled = true;
      btn.textContent = '驗證中…';

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ USER_ID: userId, PSW: password })
        });
        const data = await response.json();
        const code = data.MSG.split(' ')[0];

        if (code === '000') {
          sessionStorage.setItem('loginUser', userId);
          window.location.href = 'app.html';
        } else {
          showError(ERROR_MESSAGES[code] || '系統發生錯誤，請聯絡管理員');
        }
      } catch (err) {
        showError('無法連線至驗證伺服器，請確認網路後再試');
      } finally {
        btn.disabled = false;
        btn.textContent = '登入';
      }
    });
  </script>
</body>
</html>
