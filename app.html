<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日翊外盤平台</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>
  <script>
    // 動態載入 api.js / script.compiled.js；版號僅在實際變更這兩支檔案、要部署新版時才手動 +1
    // （改成手動版號而非每次用時間戳，是為了讓瀏覽器能快取，加快重複造訪的載入速度；
    //   注意：忘記在部署新版時 +1，使用者會吃到舊快取）
    //
    // script.compiled.js 是 script.js（原始 JSX 原始碼）用 Babel 預先編譯好的純 JS，
    // 瀏覽器直接執行、不用再即時轉譯 JSX，省掉每個訪客瀏覽器都要重跑一次的解析＋轉譯成本。
    // 改 script.js 後務必重新編譯才能推送新版（見 script.js 開頭說明）。
    (function () {
      var v = "3";
      var s1 = document.createElement('script');
      s1.src = 'api.js?v=' + v;
      s1.onload = function () {
        var s2 = document.createElement('script');
        s2.src = 'script.compiled.js?v=' + v;
        document.body.appendChild(s2);
      };
      document.body.appendChild(s1);
    })();
  </script>
</body>
</html>
